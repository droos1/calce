<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calce API Explorer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; background: #0d1117; color: #c9d1d9; padding: 24px; max-width: 1200px; margin: 0 auto; }
  h1 { font-size: 20px; margin-bottom: 20px; color: #58a6ff; }
  .controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: end; margin-bottom: 20px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
  .field input, .field select { background: #161b22; border: 1px solid #30363d; color: #c9d1d9; padding: 8px 12px; border-radius: 6px; font-size: 14px; font-family: inherit; }
  .field input:focus, .field select:focus { outline: none; border-color: #58a6ff; }
  .buttons { display: flex; gap: 8px; }
  button { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; font-family: inherit; }
  button:hover { background: #30363d; }
  button.primary { background: #238636; border-color: #238636; color: #fff; }
  button.primary:hover { background: #2ea043; }
  .status { font-size: 13px; padding: 8px 0; color: #8b949e; }
  .status.error { color: #f85149; }
  .status.ok { color: #3fb950; }
  .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .panel { background: #161b22; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; }
  .panel-header { padding: 10px 16px; background: #21262d; border-bottom: 1px solid #30363d; font-size: 13px; font-weight: 600; color: #8b949e; display: flex; justify-content: space-between; }
  .panel-body { padding: 16px; overflow-x: auto; }
  pre { font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px; border-bottom: 1px solid #30363d; color: #8b949e; font-weight: 600; }
  td { padding: 8px; border-bottom: 1px solid #21262d; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .change-pos { color: #3fb950; }
  .change-neg { color: #f85149; }
  .total-row td { border-top: 2px solid #30363d; font-weight: 600; }
  @media (max-width: 800px) { .panels { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<h1>Calce API Explorer</h1>

<div class="controls">
  <div class="field">
    <label>API Base URL</label>
    <input type="text" id="baseUrl" value="http://localhost:3000">
  </div>
  <div class="field">
    <label>User ID</label>
    <input type="text" id="userId" value="alice">
  </div>
  <div class="field">
    <label>As-of Date</label>
    <input type="date" id="asOfDate" value="2025-03-15">
  </div>
  <div class="field">
    <label>Base Currency</label>
    <select id="baseCurrency">
      <option value="SEK" selected>SEK</option>
      <option value="USD">USD</option>
      <option value="EUR">EUR</option>
    </select>
  </div>
  <div class="field">
    <label>Role</label>
    <select id="role">
      <option value="user" selected>user</option>
      <option value="admin">admin</option>
    </select>
  </div>
  <div class="buttons" style="align-self: end;">
    <button class="primary" onclick="fetchMarketValue()">Market Value</button>
    <button class="primary" onclick="fetchPortfolio()">Portfolio</button>
  </div>
</div>

<div class="status" id="status"></div>

<div class="panels">
  <div class="panel">
    <div class="panel-header">
      <span>Formatted</span>
      <span id="httpStatus"></span>
    </div>
    <div class="panel-body" id="formatted">
      <p style="color:#8b949e">Hit a button to make a request</p>
    </div>
  </div>
  <div class="panel">
    <div class="panel-header">Raw JSON</div>
    <div class="panel-body">
      <pre id="raw" style="color:#8b949e">—</pre>
    </div>
  </div>
</div>

<script>
function params() {
  return {
    baseUrl: document.getElementById('baseUrl').value.replace(/\/$/, ''),
    userId: document.getElementById('userId').value,
    asOfDate: document.getElementById('asOfDate').value,
    baseCurrency: document.getElementById('baseCurrency').value,
    role: document.getElementById('role').value,
  };
}

function queryString(p) {
  return `as_of_date=${p.asOfDate}&base_currency=${p.baseCurrency}`;
}

async function apiFetch(path) {
  const p = params();
  const url = `${p.baseUrl}${path}?${queryString(p)}`;
  const status = document.getElementById('status');
  const httpStatus = document.getElementById('httpStatus');
  status.className = 'status';
  status.textContent = `GET ${url}`;

  try {
    const res = await fetch(url, {
      headers: { 'X-User-Id': p.userId, 'X-Role': p.role },
    });
    const data = await res.json();
    httpStatus.textContent = `${res.status} ${res.statusText}`;
    httpStatus.style.color = res.ok ? '#3fb950' : '#f85149';
    document.getElementById('raw').textContent = JSON.stringify(data, null, 2);

    if (!res.ok) {
      status.className = 'status error';
      status.textContent = `Error: ${data.message || res.statusText}`;
      document.getElementById('formatted').innerHTML = `<p style="color:#f85149">${data.error}: ${data.message}</p>`;
      return null;
    }
    status.className = 'status ok';
    status.textContent = `OK — ${new Date().toLocaleTimeString()}`;
    return data;
  } catch (e) {
    status.className = 'status error';
    status.textContent = `Network error: ${e.message}. Is the API server running?`;
    httpStatus.textContent = '';
    document.getElementById('formatted').innerHTML = `<p style="color:#f85149">${e.message}</p>`;
    document.getElementById('raw').textContent = '—';
    return null;
  }
}

function fmt(n) {
  return n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function pct(n) {
  if (n == null) return '—';
  return (n * 100).toFixed(2) + '%';
}

function changeClass(n) {
  return n > 0 ? 'change-pos' : n < 0 ? 'change-neg' : '';
}

function sign(n) {
  return n > 0 ? '+' : '';
}

async function fetchMarketValue() {
  const p = params();
  const data = await apiFetch(`/v1/users/${p.userId}/market-value`);
  if (!data) return;

  let html = `<table>
    <tr><th>Instrument</th><th>Qty</th><th>Price</th><th>Currency</th><th style="text-align:right">Local MV</th><th style="text-align:right">Base MV (${data.total.currency})</th></tr>`;
  for (const pos of data.positions) {
    html += `<tr>
      <td>${pos.instrument_id}</td>
      <td class="num">${fmt(pos.quantity)}</td>
      <td class="num">${fmt(pos.price)}</td>
      <td>${pos.currency}</td>
      <td class="num">${fmt(pos.market_value.amount)}</td>
      <td class="num">${fmt(pos.market_value_base.amount)}</td>
    </tr>`;
  }
  html += `<tr class="total-row">
    <td colspan="5">Total</td>
    <td class="num">${fmt(data.total.amount)} ${data.total.currency}</td>
  </tr></table>`;
  document.getElementById('formatted').innerHTML = html;
}

async function fetchPortfolio() {
  const p = params();
  const data = await apiFetch(`/v1/users/${p.userId}/portfolio`);
  if (!data) return;

  const mv = data.market_value;
  const vc = data.value_changes;
  const ccy = mv.total.currency;

  let html = `<table>
    <tr><th>Instrument</th><th>Qty</th><th>Price</th><th>Currency</th><th style="text-align:right">Local MV</th><th style="text-align:right">Base MV (${ccy})</th></tr>`;
  for (const pos of mv.positions) {
    html += `<tr>
      <td>${pos.instrument_id}</td>
      <td class="num">${fmt(pos.quantity)}</td>
      <td class="num">${fmt(pos.price)}</td>
      <td>${pos.currency}</td>
      <td class="num">${fmt(pos.market_value.amount)}</td>
      <td class="num">${fmt(pos.market_value_base.amount)}</td>
    </tr>`;
  }
  html += `<tr class="total-row">
    <td colspan="5">Total</td>
    <td class="num">${fmt(mv.total.amount)} ${ccy}</td>
  </tr></table>`;

  html += `<table style="margin-top:20px">
    <tr><th>Period</th><th style="text-align:right">Previous</th><th style="text-align:right">Current</th><th style="text-align:right">Change</th><th style="text-align:right">%</th></tr>`;
  for (const [label, ch] of [['Daily', vc.daily], ['Weekly', vc.weekly], ['YTD', vc.ytd], ['Yearly', vc.yearly]]) {
    const cls = changeClass(ch.change.amount);
    html += `<tr>
      <td>${label}</td>
      <td class="num">${fmt(ch.previous.amount)}</td>
      <td class="num">${fmt(ch.current.amount)}</td>
      <td class="num ${cls}">${sign(ch.change.amount)}${fmt(ch.change.amount)}</td>
      <td class="num ${cls}">${sign(ch.change.amount)}${pct(ch.change_pct)}</td>
    </tr>`;
  }
  html += `</table>`;
  document.getElementById('formatted').innerHTML = html;
}
</script>
</body>
</html>
